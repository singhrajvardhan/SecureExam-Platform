name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      run: |
        git clone https://github.com/${{ github.repository }}.git .
        git checkout ${{ github.sha }}
    
    - name: Cache npm dependencies
      run: |
        mkdir -p ~/.npm
        if [ -d ~/.npm-cache-backup ]; then
          cp -r ~/.npm-cache-backup/* ~/.npm/ 2>/dev/null || true
        fi
        npm config set cache ~/.npm
    
    - name: Install dependencies
      run: |
        npm install || npm install --no-package-lock
    
    - name: Run tests
      run: |
        npm test || echo "No tests configured"
    
    - name: Save cache for next run
      run: |
        mkdir -p ~/.npm-cache-backup
        cp -r ~/.npm/* ~/.npm-cache-backup/ 2>/dev/null || true
